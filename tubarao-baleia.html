<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐋 Memórias</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(180deg,#001f3f,#003366);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    width:min(90vw,700px);
    background:rgba(0,0,0,0.7);
    border-radius:16px;
    padding:25px;
}

.header{
    display:flex;
    flex-direction:column;
    gap:5px;
    margin-bottom:15px;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.voltar{
    background:#1e90ff;
    padding:6px 12px;
    border-radius:10px;
    text-decoration:none;
    color:white;
}

.sub{
    opacity:0.7;
    font-size:0.9rem;
}

/* oceano */
.oceano{
    position:relative;
    height:350px;
    overflow:hidden;
    border-radius:12px;
    background: radial-gradient(circle at top, #003f7f, #000);
}

/* NÃO BLOQUEIA CLIQUE */
.oceano::after{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px);
    background-size:30px 30px;
    opacity:0.3;
    pointer-events:none;
}

/* tubarão */
#tubarao{
    position:absolute;
    width:140px;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    opacity:0.9;
    animation: flutuar 4s ease-in-out infinite;
    cursor:pointer;
    z-index:2;
}

@keyframes flutuar{
    0%,100% { transform:translate(-50%,0); }
    50% { transform:translate(-50%,-8px); }
}

/* bolhas */
.bolha{
    position:absolute;
    bottom:-50px;
    width:28px;
    height:28px;
    border-radius:50%;
    background:rgba(255,255,255,0.25);
    border:1px solid rgba(255,255,255,0.6);
    cursor:pointer;
    animation:subir linear forwards;
    z-index:5;
}

@keyframes subir{
    to{
        transform:translateY(-450px);
        opacity:0;
    }
}

/* overlay */
#overlay{
    position:absolute;
    top:45%;
    left:50%;
    transform:translate(-50%,-50%);
    background:rgba(0,0,0,0.75);
    padding:15px;
    border-radius:12px;
    text-align:center;
    opacity:0;
    pointer-events:none;
    transition:0.4s;
    z-index:10;
}

#overlay.show{
    opacity:1;
    pointer-events:auto;
}

#overlay img{
    max-width:160px;
    max-height: 100px;
    border-radius:8px;
}

#overlay p{
    margin-top:10px;
    font-style:italic;
}

/* diálogo */
.dialogo{
    margin-top:15px;
    text-align:center;
    opacity:0.85;
}

button{
    margin-top:10px;
    padding:6px 12px;
    border:none;
    border-radius:10px;
    background:#6a5acd;
    color:white;
    cursor:pointer;
}

.play {
    scale: 1;
    margin-top:20px;
    
    border:none;
    border-radius:10px;
    background:#32cd32;
    color:white;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
    <div class="topbar">
        <h2>🐋 Coisas que me lembram você</h2>
        <a href="index.html" class="voltar">← Voltar</a>
    </div>
    <p class="sub">Estoure as bolhas… são pequenas lembranças.</p>
</div>

<div class="oceano" id="oceano">

    <img src="sprites/peixes/tubarao-baleia.png" id="tubarao">

    <div id="overlay">
        <img id="imgMemoria">
        <p id="textoMemoria"></p>
    </div>

</div>

<div class="dialogo" id="texto">
    Às vezes eu encontro coisas por aqui...
</div>

<button id="next">Próximo</button>

</div>

<script>

// ===== MEMÓRIAS =====
const memorias = [
    {
        img: "https://cdnm.westwing.com.br/glossary/uploads/br/2023/08/11191434/lirio-azul.png",
        texto: "suas flores favoritas..."
    },
    {
        img: "https://images.unsplash.com/photo-1566342088293-38debd381c63",
        texto: "o mar de noite..."
    },
    {
        img: "imgs/musica.jpg",
        texto: "essa música sempre me lembra você.",
        musica: 'https://open.spotify.com/intl-pt/track/2QjOHCTQ1Jl3zawyYOpxh6?si=2477b5bcda7b46a6'
    },
    {
        img: "imgs/twilight.jpg",
        texto: "e claro, a saga Crepúsculo."
    },
    {
        img: "imgs/conjuring.jpg",
        texto: 'Seu filme de "romance" favorito.',
        musica: 'https://open.spotify.com/intl-pt/track/44AyOl4qVkzS48vBsbNXaC?si=7fa3520c20784274'
    },
    {
        img: "imgs/chale.jpeg",
        texto: "O sonho de um chalé na floresta."
    },
    {
        img: "imgs/reze.jpg",
        texto: "A personagem Reze."
    },
    {
        img: "imgs/scooby.jpeg",
        texto: "Seu desenho favorito, com um enfoque na Velma e Salsicha."
    }    

];

let timeout;

// ===== CRIAR BOLHA =====
function criarBolha(){
    const b = document.createElement("div");
    b.className = "bolha";

    b.style.left = Math.random()*90 + "%";
    b.style.animationDuration = (7 + Math.random()*3) + "s";

    document.getElementById("oceano").appendChild(b);

    setTimeout(()=>b.remove(),9000);
}

// ===== ESTOURAR =====
function estourar(b){

    // para animação
    b.style.animation = "none";

    const rect = b.getBoundingClientRect();

    b.style.position = "fixed";
    b.style.left = rect.left + "px";
    b.style.top = rect.top + "px";

    b.style.transition = "all 0.2s ease-out";
    b.style.transform = "scale(1.6)";
    b.style.opacity = "0";

    setTimeout(()=>b.remove(),200);

    const m = memorias[Math.floor(Math.random()*memorias.length)];

    const overlay = document.getElementById("overlay");

    document.getElementById("imgMemoria").src = m.img;
    document.getElementById("textoMemoria").textContent = m.texto;

    if(m.musica && !document.querySelector("#overlay .play")){
        const button = document.createElement("a");
        button.className = "play";
        button.textContent = "Ouvir";
        overlay.appendChild(button);
    }

    else if (!m.musica && document.querySelector("#overlay .play")){
        document.querySelector("#overlay .play").remove();
    }

    if (m.musica){
        document.querySelector("#overlay .play").href = m.musica;
    }

    overlay.classList.add("show");

    if (timeout) clearTimeout(timeout);
    timeout = setTimeout(()=>{
        overlay.classList.remove("show");
    },4500);
}

// ===== DELEGAÇÃO DE CLIQUE (NÃO FALHA) =====
document.getElementById("oceano").addEventListener("click", (e)=>{
    if(e.target.classList.contains("bolha")){
        estourar(e.target);
    }

    else if(e.target.classList.contains("play")){
        e.target.click();
    }
});

// spawn contínuo
setInterval(criarBolha,2000);

// ===== TUBARÃO =====
const tubarao = document.getElementById("tubarao");

tubarao.onclick = () => {
    tubarao.style.transform = "translateX(-50%) scale(1.08)";
    setTimeout(()=>{
        tubarao.style.transform = "translateX(-50%) scale(1)";
    },200);

    i = (i + 1) % falas.length;
    document.getElementById("texto").textContent = falas[i];
};

// ===== DIÁLOGO =====
const falas = [
    "...",
    "Às vezes eu encontro coisas por aqui.",
    "Coisas pequenas.",
    "Que me fazem lembrar de você.",
    "...",
    "Tenta pegar uma."
];

let i=1;

document.getElementById("next").onclick=()=>{
    i=(i+1)%falas.length;
    document.getElementById("texto").textContent=falas[i];
};

</script>

</body>
</html>
