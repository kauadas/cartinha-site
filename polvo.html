<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌌 Observatório</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: Arial, sans-serif;
    background: linear-gradient(180deg, #001f3f, #0047AB);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
}

.container {
    width: min(90vw, 700px);
    background: rgba(0,0,0,0.7);
    border-radius: 16px;
    padding: 25px;
    box-shadow: 0 0 30px rgba(0,0,0,0.6);
}

.header {
    display:flex;
    justify-content:space-between;
    margin-bottom:20px;
}

.volta-link {
    background:#1e90ff;
    padding:6px 12px;
    border-radius:10px;
    text-decoration:none;
    color:white;
}

.conteudo {
    text-align:center;
    margin-bottom:20px;
    opacity:0.9;
}

canvas {
    width:100%;
    border-radius:12px;
    margin-top:10px;
}

/* NPC */
.npc {
    margin-top:25px;
    text-align:center;
}

.npc img {
    width:110px;
    cursor:pointer;
    filter: drop-shadow(0 0 10px #BA55D3);
}

.dialogo {
    margin-top:10px;
    background: rgba(40,20,70,0.8);
    padding:15px;
    border-radius:12px;
    min-height:60px;
}

button {
    margin-top:8px;
    padding:6px 14px;
    border:none;
    border-radius:10px;
    background:#BA55D3;
    color:white;
    cursor:pointer;
}

.info, .mensagem {
    text-align:center;
    margin-top:10px;
}

.mensagem {
    font-style:italic;
    opacity:0.8;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
    <h2>🌌 Observatório Submerso</h2>
    <a href="index.html" class="volta-link">← Voltar</a>
</div>

<div class="conteudo">
    <p>Às vezes o céu parece infinito...</p>
    <p>Mas algumas coisas fazem ele parecer pequeno.</p>
</div>

<!-- <canvas id="canvas" width="600" height="350"></canvas> -->
<iframe 
src="https://stellarium-web.org/?date=2024-03-11T21:00:00&lat=-31.77&lng=-52.34"
width="100%" 
height="400"
style="border:none; border-radius:12px;">
</iframe>
<div class="info" id="data"></div>
<div class="mensagem" id="mensagem"></div>

<!-- NPC -->
<div class="npc">
    <img src="sprites/peixes/polvo.png" id="polvo">

    <div class="dialogo" id="texto">
        Clica em mim... eu tava pensando em umas coisas.
    </div>

    <button id="btn">Próximo</button>
</div>

</div>

<script>
// ===== DATA =====
const hoje = new Date(2026, 2, 11); // 11 de março de 2026
const seed = hoje.getDate() + hoje.getMonth()*31 + hoje.getFullYear();

document.getElementById("data").textContent =
    "Céu de: " + hoje.toLocaleDateString() + " o dia em que encontrei o amor.";

// ===== RANDOM =====
function rand(seed){
    let x = Math.sin(seed)*10000;
    return x - Math.floor(x);
}



// ===== MENSAGEM =====
const mensagens=[
    "Eu escolheria você de novo.",
    "Mesmo sem entender tudo, eu fico.",
    "Você virou meu lugar favorito.",
    "Entre bilhões... ainda é você."
];

document.getElementById("mensagem").textContent =
    mensagens[seed % mensagens.length];

// ===== NPC DIÁLOGO =====
const dialogos = [
    "Eu fico olhando pra essas estrelas...",
    "E pensando como algumas coisas simplesmente acontecem.",
    "Tipo encontrar alguém no meio de tudo isso.",
    "Estranho né?",
    "...",
    "Mas eu acho bonito."
];

let i = 0;

document.getElementById("btn").onclick = () => {
    i = (i + 1) % dialogos.length;
    document.getElementById("texto").textContent = dialogos[i];
};

// clique direto no polvo também avança
document.getElementById("polvo").onclick = () => {
    i = (i + 1) % dialogos.length;
    document.getElementById("texto").textContent = dialogos[i];
};

</script>

</body>
</html>
