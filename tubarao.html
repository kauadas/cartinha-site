<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦈 Nosso Tempo</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:Arial;
    background:#000814;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* caixa */
.container{
    width:min(90vw,700px);
    height:90vh;
    background:linear-gradient(180deg,#001f3f,#003366);
    border-radius:16px;
    border:2px solid rgba(135,206,250,0.4);
    box-shadow:0 0 30px rgba(0,0,0,0.7);
    position:relative;
    overflow:hidden;
}

.header{
    text-align:center;
    padding:15px;
    display:flex;
    flex-direction:column;
    gap:5px;
    margin-bottom:15px;
    border-bottom:1px solid rgba(255,255,255,0.1);
}

.topbar{
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    align-items:center;
}
.voltar{
    background:#1e90ff;
    padding:6px 12px;
    border-radius:10px;
    text-decoration:none;
    color:white;
}


/* área */
.area{
    width:100%;
    height:100%;
    position:relative;
}

/* linha */
.linha{
    position:absolute;
    bottom:30%;
    width:100%;
    height:2px;
    background:rgba(255,255,255,0.2);
}

/* tubarão */
.tubarao{
    position:absolute;
    bottom:32%;
    left:30%;
    transform:translate(-50%,50%) scaleX(-1);
    width:50px;
    opacity:0.85;
    transition:0.25s ease-out;
}

/* pontos */
.evento{
    position:absolute;
    bottom:29%;
    width:8px;
    height:8px;
    border-radius:50%;
    background:#87CEFA;
    opacity:0.4;
    transition:0.3s;
}

.evento.ativo{
    transform:scale(2);
    opacity:1;
}

/* imagem */
.imgBox{
    position:absolute;
    top:10%;
    left:50%;
    transform:translateX(-50%);
    width:200px;
    height:120px;
    border-radius:10px;
    overflow:hidden;
    opacity:0;
    transition:0.4s;
}

.imgBox img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* texto */
.texto{
    position:absolute;
    bottom:15%;
    width:100%;
    text-align:center;
}

.data{
    font-size:0.75rem;
    opacity:0.6;
}

.frase{
    font-size:1rem;
    margin-top:5px;
}

.dica{
    position:absolute;
    bottom:5%;
    width:100%;
    text-align:center;
    font-size:0.7rem;
    opacity:0.4;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
    <div class="topbar">
        <h2>🦈 Nosso Tempo</h2>
        <a href="index.html" class="voltar">← Voltar</a>
    </div>
    
</div>

<div class="area" id="area">

<div class="linha"></div>

<img src="sprites/peixes/tubarao.png" class="tubarao" id="tubarao">

<div class="imgBox" id="imgBox">
    <img id="imgMomento">
</div>

<div class="texto">
    <div class="data" id="data">...</div>
    <div class="frase" id="frase">Segue… eu já vi isso antes.</div>
</div>

<div class="dica">(arraste para os lados)</div>

</div>

</div>

<script>

let progresso = 0;
let target = 0;
let arrastando = false;

const momentos = [
    { p:0.1, data:"11/03", img:"sprites/locais/local_polvo.png", texto:"acho que foi aqui que tudo começou" },
    { p:0.3, data:"um dia qualquer", img:"sprites/locais/local_shark.png", texto:"não parecia grande… mas ficou" },
    { p:0.5, data:"sem perceber", img:"sprites/locais/local_polvo.png", texto:"foi crescendo do jeito mais estranho" },
    { p:0.7, data:"quando eu notei", img:"sprites/locais/local_tubarao_baleia.png", texto:"já era importante demais" },
    { p:0.9, data:"agora", img:"sprites/locais/local_polvo.png", texto:"e eu não quero que isso acabe" }
];

const frase = document.getElementById("frase");
const dataEl = document.getElementById("data");
const tubarao = document.getElementById("tubarao");
const imgBox = document.getElementById("imgBox");
const imgMomento = document.getElementById("imgMomento");
const area = document.getElementById("area");

// criar pontos
momentos.forEach(m=>{
    let e = document.createElement("div");
    e.className = "evento";
    e.style.left = (m.p * 100) + "%";
    area.appendChild(e);
    m.el = e;
});

// encontra mais próximo
function getMaisProximo(p){
    let mais = momentos[0];
    let menor = Infinity;

    momentos.forEach(m=>{
        let d = Math.abs(p - m.p);
        if(d < menor){
            menor = d;
            mais = m;
        }
    });

    return mais;
}

// atualizar visual
function render(){

    let atual = getMaisProximo(progresso);

    frase.textContent = atual.texto;
    dataEl.textContent = atual.data;
    imgMomento.src = atual.img;
    imgBox.style.opacity = 1;

    tubarao.style.left = (atual.p * 100) + "%";

    momentos.forEach(m=>{
        if(m === atual){
            m.el.classList.add("ativo");
        } else {
            m.el.classList.remove("ativo");
        }
    });
}

// magnetismo (loop)
function loop(){

    if(!arrastando){
        let alvo = getMaisProximo(target).p;
        progresso += (alvo - progresso) * 0.15;
    }

    render();
    requestAnimationFrame(loop);
}

loop();

// drag mouse
area.onmousedown = ()=> arrastando = true;
area.onmouseup = ()=> arrastando = false;

area.onmousemove = (e)=>{
    if(arrastando){
        target = e.clientX / area.clientWidth;
        progresso = target;
    }
};

// touch
area.ontouchstart = ()=> arrastando = true;
area.ontouchend = ()=> arrastando = false;

area.ontouchmove = (e)=>{
    target = e.touches[0].clientX / area.clientWidth;
    progresso = target;
};

</script>

</body>
</html>
